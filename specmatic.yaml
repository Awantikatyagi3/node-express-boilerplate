version: "3"

systemUnderTest:
  service:
    definitions:
      - definition:
          source:
            filesystem:
              directory: "."
          specs:
            - "openapi.yaml"
    runOptions:
      auth:
        bearerAuth:
          bearer: "${BEARER_TOKEN}"
      baseUrl: "http://node-app:3000/v1"
components:
  runOptions:
    test:
      openapi:
        type: test
        baseUrl: "http://node-app:3000/v1"
