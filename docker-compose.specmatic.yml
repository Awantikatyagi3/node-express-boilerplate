version: '3'

services:
  specmatic:
    image: specmatic/specmatic:latest
    depends_on:
      node-app:
        condition: service_healthy
      token-generator:
        condition: service_completed_successfully
    volumes:
      - .:/usr/src/app
    working_dir: /usr/src/app
    command: test --host node-app --port 3000
    networks:
      - node-network
    environment:
      - SPECMATIC_GENERATIVE_TESTS=true
    env_file:
      - ./token/.env
  token-generator:
    image: node:14-alpine
    depends_on:
      node-app:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
    working_dir: /usr/src/app
    command: node scripts/token-generator.js
    networks:
      - node-network
