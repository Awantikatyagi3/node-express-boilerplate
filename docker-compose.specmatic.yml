services:
  node-app:
    build: .
    image: node-app
    environment:
      - NODE_ENV=test
      - MONGODB_URL=mongodb://mongodb:27017/node-boilerplate
    ports:
      - "3000:3000"
    command: node src/index.js
    depends_on:
      - mongodb
    volumes:
      - .:/usr/src/node-app
      - /usr/src/node-app/node_modules
    networks:
      - node-network
    healthcheck:
      test: ["CMD","wget","--spider","-q","http://localhost:3000/v1/docs"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mongodb:
    image: mongo:4.2.1-bionic
    ports:
      - "27017:27017"
    volumes:
      - dbdata:/data/db
    networks:
      - node-network

  token-generator:
    image: node:14-alpine
    restart: on-failure
    depends_on:
      node-app:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
    working_dir: /usr/src/app
    command: node scripts/token-generator.js
    networks:
      - node-network
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3

  specmatic:
    image: specmatic/specmatic:latest
    depends_on:
      node-app:
        condition: service_healthy
      token-generator:
        condition: service_completed_successfully
    volumes:
      - .:/usr/src/app
    working_dir: /usr/src/app
    command: test --testBaseURL http://node-app:3000/v1
    networks:
      - node-network
    environment:
      - SPECMATIC_GENERATIVE_TESTS=true
    env_file:
      - ./token/.env

volumes:
  dbdata:

networks:
  node-network:
    driver: bridge
