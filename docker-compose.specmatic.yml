

services:
  specmatic:
    image: specmatic/specmatic:latest
    depends_on:
      node-app:
        condition: service_healthy
      token-generator:
        condition: service_completed_successfully
    volumes:
      - .:/usr/src/app
    working_dir: /usr/src/app
    command: test --host node-app --port 3000
    networks:
      - node-network
    environment:
      - SPECMATIC_GENERATIVE_TESTS=true
    env_file:
      - ./token/.env
  token-generator:
    image: node:14-alpine
    depends_on:
      node-app:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
    working_dir: /usr/src/app
    command: node scripts/token-generator.js
    networks:
      - node-network
node-app:
  build: .
  image: node-app
  environment:
    - MONGODB_URL=mongodb://mongodb:27017/node-boilerplate
  ports:
    - '3000:3000'
  depends_on:
    - mongodb
  volumes:
    - .:/usr/src/node-app
    - /usr/src/node-app/node_modules
  networks:
    - node-network
  healthcheck:
    test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/v1/docs"]
    interval: 10s
    timeout: 5s
    retries: 5

networks:
  node-network:
    external: true
