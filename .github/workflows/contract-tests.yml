name: Contract Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  specmatic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Setup environment variables
        run: cp .env.example .env

      - name: Generate static OpenAPI spec
        run: npm run generate:openapi
      
      - name: Validate OpenAPI examples
        run: npx specmatic examples validate --spec-file=openapi.yaml
  
      - name: Start App (with test DB)
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

      - name: Wait for app health
        run: |
          echo "Waiting for node-app to be healthy..."
          timeout 60 bash -c 'while [[ "$(docker inspect --format="{{json .State.Health.Status}}" node-app-dev 2>/dev/null)" != "\"healthy\"" ]]; do sleep 2; done'
          echo "App is healthy!"

      - name: Setup Specmatic Auth
        run: |
          echo "Registering test user to get JWT token..."
          RESPONSE=$(curl -s -X POST http://localhost:3000/v1/auth/register \
            -H "Content-Type: application/json" \
            -d '{"name":"Specmatic Test","email":"specmatic@example.com","password":"Password123"}')
          
          TOKEN=$(echo $RESPONSE | grep -o '"token":"[^"]*"' | head -n 1 | cut -d '"' -f 4)
          
          if [ -z "$TOKEN" ]; then
            echo "Failed to get token! Response: $RESPONSE"
            exit 1
          fi
          echo "Setting bearerAuth token as environment variable for Specmatic"
          echo "bearerAuth=$TOKEN" >> $GITHUB_ENV
          mkdir -p token
          echo "BEARER_TOKEN=$TOKEN" > token/.env
          echo "bearerAuth=$TOKEN" >> token/.env
          echo "SPECMATIC_BEARER_AUTH=$TOKEN" >> token/.env

      - name: Run Specmatic Contract Tests
        run: |
          docker compose -f docker-compose.yml \
            -f docker-compose.dev.yml \
            -f docker-compose.specmatic.yml \
            up specmatic --abort-on-container-exit

      - name: Stop containers
        if: always()
        run: docker compose down
